---
# Docker installation following official documentation:
# https://docs.docker.com/engine/install/ubuntu/#install-using-the-repository

- name: Install prerequisites for Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  tags:
    - docker
    - packages

- name: Create directory for Docker GPG key
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags:
    - docker

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  tags:
    - docker

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list
  tags:
    - docker

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: yes
  tags:
    - docker

- name: Install Docker Engine, CLI and containerd
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
    state: present
  tags:
    - docker
    - packages

- name: Get latest docker-compose standalone version
  uri:
    url: https://api.github.com/repos/docker/compose/releases/latest
    return_content: yes
  register: compose_release
  tags:
    - docker
    - packages

- name: Install docker-compose standalone binary (docker-compose with dash)
  get_url:
    url: "https://github.com/docker/compose/releases/download/{{ compose_release.json.tag_name }}/docker-compose-linux-x86_64"
    dest: /usr/local/bin/docker-compose
    mode: '0755'
    owner: root
    group: root
  tags:
    - docker
    - packages

- name: Ensure Docker service is started and enabled
  systemd:
    name: docker
    state: started
    enabled: yes
  tags:
    - docker
    - services

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  tags:
    - docker
    - users

- name: Reset SSH connection to allow user group changes to take effect
  meta: reset_connection
  tags:
    - docker

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false
  tags:
    - docker
    - verify

- name: Display Docker version
  debug:
    msg: "✓ Docker installed: {{ docker_version.stdout }}"
  tags:
    - docker
    - verify

- name: Verify docker-compose standalone
  command: docker-compose version
  register: compose_version
  changed_when: false
  tags:
    - docker
    - verify

- name: Display docker-compose version
  debug:
    msg: "✓ docker-compose installed: {{ compose_version.stdout }}"
  tags:
    - docker
    - verify
